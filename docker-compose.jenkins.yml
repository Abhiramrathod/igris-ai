version: '3.8'

services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    ports:
      - "2121:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
      - ./jenkins/init.groovy.d:/var/jenkins_home/init.groovy.d
    environment:
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dhudson.model.DownloadService.noSignatureCheck=true
        -Djenkins.model.JenkinsLocationConfiguration.url=http://localhost:2121
    networks:
      - jenkins-network

volumes:
  jenkins-data:
    driver: local

networks:
  jenkins-network:
    driver: bridge
