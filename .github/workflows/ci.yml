name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jenkins:
    name: Jenkins CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Jenkins image
        run: docker compose -f docker-compose.jenkins.yml build

      - name: Start Jenkins
        run: docker compose -f docker-compose.jenkins.yml up -d

      - name: Wait for Jenkins to be ready
        run: |
          echo "Waiting for Jenkins..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2121 || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ]; then
              echo "Jenkins is ready!"
              break
            fi
            echo "Waiting... ($i/60) status=$STATUS"
            sleep 5
          done

      - name: Setup Jenkins CLI
        run: |
          curl -sSL http://localhost:2121/jnlpJars/jenkins-cli.jar -o jenkins-cli.jar

      - name: Create Jenkins job
        run: |
          java -jar jenkins-cli.jar -s http://localhost:2121/ create-job ai-igris < jenkins/pipeline.xml

      - name: Monitor Jenkins build
        run: |
          echo "### 🚀 Jenkins Build Started" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Jenkins UI:** [http://localhost:2121](http://localhost:2121)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          java -jar jenkins-cli.jar -s http://localhost:2121/ build ai-igris -v -s

      - name: Get build log
        if: always()
        run: |
          echo "### Jenkins Console Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          java -jar jenkins-cli.jar -s http://localhost:2121/ console ai-igris -f 200 >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Stop Jenkins
        if: always()
        run: docker compose -f docker-compose.jenkins.yml down -v
