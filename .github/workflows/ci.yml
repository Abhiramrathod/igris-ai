name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-igris-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-igris-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Initialize Kafka container
        run: docker compose up -d kafka

      - name: Wait for Kafka to be ready
        run: |
          echo "Waiting for Kafka to be ready..."
          for i in $(seq 1 30); do
            if echo > /dev/tcp/localhost/9092 2>/dev/null; then
              echo "Kafka is ready!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Kafka failed to start"
          exit 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: ./mvnw -B clean verify

      - name: Upload application JAR
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: ai-igris-app-${{ github.sha }}
          path: ai-igris-app/target/*.jar
          retention-days: 7
          if-no-files-found: error

      - name: Stop Kafka container
        if: always()
        run: docker compose down -v

  validate:
    name: Validate
    if: always()
    needs: [frontend-check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        if: needs.frontend-check.result != 'success' || needs.build.result != 'success'
        run: |
          echo "One or more jobs failed."
          echo "  frontend-check: ${{ needs.frontend-check.result }}"
          echo "  build: ${{ needs.build.result }}"
          exit 1
