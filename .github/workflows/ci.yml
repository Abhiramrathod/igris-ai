name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jenkins:
    name: Jenkins CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Jenkins image
        run: docker compose -f docker-compose.jenkins.yml build

      - name: Start Jenkins
        run: docker compose -f docker-compose.jenkins.yml up -d

      - name: Wait for Jenkins to be ready
        run: |
          echo "Waiting for Jenkins..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2121 || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ]; then
              echo "Jenkins is ready!"
              exit 0
            fi
            echo "Waiting... ($i/60) status=$STATUS"
            sleep 5
          done
          echo "Jenkins failed to start"
          docker compose -f docker-compose.jenkins.yml logs jenkins
          exit 1

      - name: Monitor Jenkins build
        run: |
          curl -sSL http://localhost:2121/jnlpJars/jenkins-cli.jar -o jenkins-cli.jar
          echo "### 🚀 Jenkins Build Started" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Jenkins UI:** [http://localhost:2121](http://localhost:2121)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          java -jar jenkins-cli.jar -s http://localhost:2121/ -auth admin:admin build ai-igris -v -s

      - name: Get build log
        if: always()
        run: |
          echo "========================================="
          echo "Jenkins Console Output:"
          echo "========================================="
          java -jar jenkins-cli.jar -s http://localhost:2121/ -auth admin:admin console ai-igris -f 200 || true

      - name: Stop Jenkins
        if: always()
        run: docker compose -f docker-compose.jenkins.yml down -v
