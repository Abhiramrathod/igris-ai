name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jenkins:
    name: Jenkins CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Jenkins image
        run: docker compose -f docker-compose.jenkins.yml build

      - name: Start Jenkins
        run: docker compose -f docker-compose.jenkins.yml up -d

      - name: Wait for Jenkins to be ready
        run: |
          echo "Waiting for Jenkins..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2121 || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ]; then
              echo "Jenkins is ready!"
              break
            fi
            echo "Waiting... ($i/60) status=$STATUS"
            sleep 5
          done

      - name: Install and start ngrok
        run: |
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar -xz -C /usr/local/bin
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          nohup ngrok http 2121 --log=stdout > ngrok.log 2>&1 &
          sleep 10
          echo "=== ngrok logs ==="
          cat ngrok.log
          echo "=== ngrok tunnels ==="
          curl -s http://localhost:4040/api/tunnels || echo "ngrok API not reachable"
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>&1)
          echo "NGROK_URL=$NGROK_URL"
          echo "### Jenkins UI (Live)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Click the link below to open Jenkins:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [$NGROK_URL]($NGROK_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This link is valid while the workflow is running." >> $GITHUB_STEP_SUMMARY

      - name: Setup Jenkins CLI
        run: |
          curl -sSL http://localhost:2121/jnlpJars/jenkins-cli.jar -o jenkins-cli.jar

      - name: Create Jenkins job
        run: |
          GIT_URL="https://github.com/${{ github.repository }}.git"
          GIT_BRANCH="${{ github.ref_name }}"
          sed -e "s|@GIT_URL@|${GIT_URL}|g" -e "s|@GIT_BRANCH@|${GIT_BRANCH}|g" jenkins/pipeline.xml > pipeline-config.xml
          java -jar jenkins-cli.jar -s http://localhost:2121/ create-job ai-igris < pipeline-config.xml

      - name: Monitor Jenkins build
        run: |
          java -jar jenkins-cli.jar -s http://localhost:2121/ build ai-igris -v -s

      - name: Get build log
        if: always()
        run: |
          echo "### Jenkins Console Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          java -jar jenkins-cli.jar -s http://localhost:2121/ console ai-igris -f 200 >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Stop Jenkins
        if: always()
        run: docker compose -f docker-compose.jenkins.yml down -v
